# ─────────────────────────────────────────────────────────────
# RunWatch CI Pipeline
# Runs on every push/PR to main — build, lint, test, security
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Detect Changes ──────────────────────────────────────────
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
      docker: ${{ steps.filter.outputs.docker }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
              - 'package.json'
            server:
              - 'server/**'
              - 'package.json'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'
            workflows:
              - '.github/workflows/**'

  # ── Client Pipeline ────────────────────────────────────────
  client-build:
    name: 🖥️ Client — Build & Lint
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript type check
        run: npx tsc --noEmit --pretty
        continue-on-error: true

      - name: 🧹 Lint
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx --format stylish --max-warnings 50
        continue-on-error: true

      - name: 🏗️ Build
        run: CI=false npm run build
        env:
          REACT_APP_API_URL: http://localhost/api
          REACT_APP_WEBSOCKET_URL: ws://localhost

      - name: 📊 Bundle size report
        run: |
          echo "### 📦 Client Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh build/ 2>/dev/null || echo "No build output"
          find build/static -name '*.js' -exec du -sh {} \; 2>/dev/null | sort -rh | head -10
          find build/static -name '*.css' -exec du -sh {} \; 2>/dev/null | sort -rh | head -5
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Also write to summary
          {
            echo "| Asset | Size |"
            echo "|-------|------|"
            find build/static -name '*.js' -exec du -sh {} \; 2>/dev/null | sort -rh | head -10 | while read size file; do
              echo "| \`$(basename $file)\` | $size |"
            done
            find build/static -name '*.css' -exec du -sh {} \; 2>/dev/null | sort -rh | head -5 | while read size file; do
              echo "| \`$(basename $file)\` | $size |"
            done
          } >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 7

  client-test:
    name: 🧪 Client — Tests
    needs: changes
    if: needs.changes.outputs.client == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🧪 Run tests
        run: npx react-scripts test --ci --coverage --watchAll=false --reporters=default --reporters=jest-junit 2>/dev/null || echo "No tests found — skipping"
        env:
          CI: true
          JEST_JUNIT_OUTPUT_DIR: ./reports
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name: 📊 Test results summary
        if: always()
        run: |
          echo "### 🧪 Client Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/junit.xml ]; then
            echo "✅ Tests executed — see artifacts for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test files found. Consider adding tests to improve coverage." >> $GITHUB_STEP_SUMMARY
          fi

  # ── Server Pipeline ────────────────────────────────────────
  server-build:
    name: ⚙️ Server — Validate & Lint
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npx eslint . --ext .js,.mjs --max-warnings 50 2>/dev/null || echo "No ESLint config found — skipping"
        continue-on-error: true

      - name: ✅ Syntax validation
        run: node --check server.js && echo "✅ server.js syntax OK"

      - name: 📋 Dependency audit
        run: |
          echo "### ⚙️ Server Dependency Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total deps | $(npm ls --all --json 2>/dev/null | jq '[.. | .version? // empty] | length') |" >> $GITHUB_STEP_SUMMARY
          echo "| Direct deps | $(jq '.dependencies | length' package.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Node version | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY

  # ── Security Scanning ──────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 Client audit
        working-directory: client
        run: |
          npm ci --legacy-peer-deps
          npm audit --omit=dev --audit-level=high 2>&1 || true
        continue-on-error: true

      - name: 🔒 Server audit
        working-directory: server
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high 2>&1 || true
        continue-on-error: true

      - name: 📊 Security summary
        run: |
          echo "### 🔒 Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:**" >> $GITHUB_STEP_SUMMARY
          cd client && npm audit --omit=dev 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Server:**" >> $GITHUB_STEP_SUMMARY
          cd ../server && npm audit --omit=dev 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true

  # ── Docker Build ───────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    needs: [changes, client-build, server-build]
    if: always() && (needs.changes.outputs.docker == 'true' || needs.changes.outputs.client == 'true' || needs.changes.outputs.server == 'true' || needs.changes.outputs.workflows == 'true' || github.event_name == 'push')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [client, server]
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Build ${{ matrix.component }} image
        run: |
          docker build \
            --tag runwatch-${{ matrix.component }}:ci-${{ github.sha }} \
            --tag runwatch-${{ matrix.component }}:latest \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            ./${{ matrix.component }}

      - name: 📏 Image size
        run: |
          SIZE=$(docker image inspect runwatch-${{ matrix.component }}:latest --format '{{.Size}}' | numfmt --to=iec-i 2>/dev/null || docker image inspect runwatch-${{ matrix.component }}:latest --format '{{.Size}}')
          echo "### 🐳 ${{ matrix.component }} Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "Size: **${SIZE}**" >> $GITHUB_STEP_SUMMARY

  # ── Integration Test (docker-compose) ──────────────────────
  integration:
    name: 🔗 Integration — Docker Compose
    needs: docker
    if: always() && needs.docker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📝 Create CI environment
        run: |
          cat > .env << 'EOF'
          MONGO_ROOT_USERNAME=admin
          MONGO_ROOT_PASSWORD=testpassword123
          MONGO_APP_USERNAME=runwatch_app
          MONGO_APP_PASSWORD=testpassword123
          GITHUB_APP_ID=12345
          GITHUB_WEBHOOK_SECRET=test
          CLIENT_URL=http://localhost
          ADMIN_API_TOKEN=ci-test-token
          NODE_ENV=production
          REACT_APP_API_URL=http://localhost/api
          REACT_APP_WEBSOCKET_URL=ws://localhost
          GITHUB_APP_PRIVATE_KEY_PATH=/tmp/dummy-key.pem
          EOF
          # Trim leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env
          touch /tmp/dummy-key.pem

      - name: 🔗 Validate docker-compose
        run: docker compose config -q

      - name: 🚀 Start services
        run: docker compose up -d --build --wait --wait-timeout 120 2>&1 || true

      - name: 🏥 Health checks
        run: |
          echo "### 🔗 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Wait for services
          sleep 10

          # Check container status
          echo "**Container Status:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker compose ps >> $GITHUB_STEP_SUMMARY 2>&1
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Test server health
          if curl -sf http://localhost:5001/api/health --max-time 10 2>/dev/null; then
            echo "✅ Server health check passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Server health endpoint not responding (may need /api/health route)" >> $GITHUB_STEP_SUMMARY
          fi

          # Test client
          if curl -sf http://localhost --max-time 10 2>/dev/null | head -1 | grep -q "html"; then
            echo "✅ Client serving HTML" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Client not responding on port 80" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📋 Logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: 🧹 Cleanup
        if: always()
        run: docker compose down -v 2>/dev/null || true

  # ── Summary ────────────────────────────────────────────────
  ci-status:
    name: ✅ CI Status
    needs: [client-build, client-test, server-build, security, docker, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Pipeline Summary
        run: |
          echo "## 🏁 RunWatch CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🖥️ Client Build | \`${{ needs.client-build.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Client Tests | \`${{ needs.client-test.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Server Validate | \`${{ needs.server-build.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Audit | \`${{ needs.security.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | \`${{ needs.docker.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Integration | \`${{ needs.integration.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: **${{ github.actor }}** via \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if critical jobs failed
        if: |
          needs.client-build.result == 'failure' ||
          needs.server-build.result == 'failure'
        run: exit 1
