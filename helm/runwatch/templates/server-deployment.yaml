apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runwatch.server.fullname" . }}
  labels:
    {{- include "runwatch.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      {{- include "runwatch.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "runwatch.server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "runwatch.serviceAccountName" . }}
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.server.port | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "runwatch.secretName" . }}
                  key: mongodb-uri
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "runwatch.secretName" . }}
                  key: github-webhook-secret
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "runwatch.secretName" . }}
                  key: github-app-id
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: "/secrets/github/private-key.pem"
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runwatch.secretName" . }}
                  key: admin-api-token
            - name: CLIENT_URL
              value: {{ required "clientUrl is required" .Values.clientUrl | quote }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: github-private-key
              mountPath: /secrets/github
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      volumes:
        - name: github-private-key
          secret:
            secretName: {{ include "runwatch.secretName" . }}
            items:
              - key: github-app-private-key
                path: private-key.pem
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
