apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "runwatch.client.fullname" . }}-nginx
  labels:
    {{- include "runwatch.client.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
