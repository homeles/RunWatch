name: Build & Publish Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: ${{ github.repository_owner }}/runwatch-server
  CLIENT_IMAGE_NAME: ${{ github.repository_owner }}/runwatch-client

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server Docker image
        id: build-and-push-server
        uses: docker/build-push-action@v7
        with:
          context: server
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest
          push: true
          labels: |
            org.opencontainers.image.source=${{github.server_url}}/${{github.repository}}
            org.opencontainers.image.description=${{github.server_url}}/${{github.repository}}
            org.opencontainers.image.licenses=MIT

      - name: Build and push client Docker image
        id: build-and-push-client
        uses: docker/build-push-action@v7
        with:
          context: client
          platforms: |
            linux/amd64
            linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}:latest
          push: true
          labels: |
            org.opencontainers.image.source=${{github.server_url}}/${{github.repository}}
            org.opencontainers.image.description=${{github.server_url}}/${{github.repository}}
            org.opencontainers.image.licenses=MIT