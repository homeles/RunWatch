apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runwatch.client.fullname" . }}
  labels:
    {{- include "runwatch.client.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.client.replicas }}
  selector:
    matchLabels:
      {{- include "runwatch.client.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "runwatch.client.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/client-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "runwatch.serviceAccountName" . }}
      containers:
        - name: client
          image: "{{ .Values.client.image.repository }}:{{ .Values.client.image.tag }}"
          imagePullPolicy: {{ .Values.client.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.client.port }}
              protocol: TCP
          env:
            - name: REACT_APP_API_URL
              value: {{ required "reactAppApiUrl is required" .Values.reactAppApiUrl | quote }}
            - name: REACT_APP_WEBSOCKET_URL
              value: {{ required "reactAppWebsocketUrl is required" .Values.reactAppWebsocketUrl | quote }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.client.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "runwatch.client.fullname" . }}-nginx
      {{- with .Values.client.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.client.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
