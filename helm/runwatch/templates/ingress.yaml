{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-runwatch
  labels:
    {{- include "runwatch.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Route /api/* to the backend server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "runwatch.server.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
          # Route /socket.io/* to the backend server (WebSocket)
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: {{ include "runwatch.server.fullname" . }}
                port:
                  number: {{ .Values.server.port }}
          # Everything else goes to the client
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "runwatch.client.fullname" . }}
                port:
                  number: 80
{{- end }}
